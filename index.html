<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我心里至爱生命至尊</title>
    <style>
        body { 
            text-align: center; 
            margin-top: 100px;
            font-family: "Microsoft Yahei", sans-serif;
        }
        #lockBox {
            margin: 120px auto;
            width: min(90%, 420px);
        }
        .pwd-group {
            margin-top:15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        #pwd {
             width: 100%;
            padding: 10px 14px;
            font-size: 16px;
            border:1px solid #ddd;
            border-radius:6px;
        }
         #unlockBtn {
            padding: 10px 24px;
            font-size: 16px;
            cursor: pointer;
            background: white;
            color: white;
            border: none;
            border-radius: 6px;
            white-space: nowrap;
        }
        #unlockBtn:hover{
            background: pink;
        }
        #content {
            display: none;
            line-height: 2.2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .autosingleimg {
            max-width: 90%;
            width: 700px;
            height: auto;
            display: block;
            margin: 30px auto;
            border-radius: 10px;
        }
        .img-row {
            display: flex;
            gap: 5px; /* 图片之间间距 */
            justify-content: center;
            flex-wrap: wrap; /* 手机屏幕不够自动换行 */
            margin: 30px 0;
        }
        .img-row .llimg {
            width: 80px; /* 单张图片宽度，调小这里就能缩小 */
            max-width: 28%;
            margin: 0;
        }
        .box-wrap {
            border: 10px solid pink; /* 边框粗细+颜色 */
            border-radius: 12px;       /* 圆角，不要就删掉这行 */
            padding: 25px;            /* 内容和边框之间留白 */
            max-width: 800px;
            margin: 40px auto;        /* 上下外边距、居中 */
        }
    </style>
</head>
<body>
    <!-- 密码输入框 -->
    <div id="lockBox">
        <h1>请输入访问密码</h1>
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="checkPwd()">解锁查看</button>
    </div>

    <!-- 加密私密内容 -->
    <div id="content">
        <h1>我有你给的爱因而完全——《天下无双》</h1>
        <h2 style="font-size:20px;font-weight:normal;">2026/7/4 制作这个网页的初衷是，希望即使数十年后我们离开这个世界，我们经历的点点滴滴也能永远留在这里。</h2>
        <div class="img-row">
        <p>我们用纸笔传达彼此的心意~</p>
        <p></p>
        <img class="llimg" src="images/qs1.jpg">
        <img class="llimg" src="images/qs2.jpg">
        <img class="llimg" src="images/qs3.jpg">
        <p></p>
        <p>每次看都很感动，很温暖！我要一直爱李好~</p>
        </div>
    </div>







    
<script>
// 仅填写纯数字/文字密码
const PASSWORD = "20060318";
function checkPwd(){
    let input = document.getElementById("pwd").value.trim();
    if(input === PASSWORD){
        document.getElementById("lockBox").style.display = "none";
        document.getElementById("content").style.display = "block";
    }else{
        alert("密码不对，去问一下李好密码是多少~");
    }
}
</script>
</body>
</html>
