<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我心里至爱生命至尊</title>
    <style>
        body { 
            text-align: center; 
            margin-top: 100px;
            font-family: "Microsoft Yahei", sans-serif;
        }
        #lockBox {
            margin: 120px auto;
        }
        #pwd {
            padding: 8px 12px;
            font-size: 16px;
            width: 220px;
        }
        button {
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-left: 8px;
        }
        #content {
            display: none;
            line-height: 2.2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .autoimg {
            max-width: 90%;
            width: 700px;
            height: auto;
            display: block;
            margin: 30px auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- 密码输入框 -->
    <div id="lockBox">
        <h1>请输入专属访问密码</h1>
        <input type="password" id="pwd" placeholder="输入密码">
        <button onclick="checkPwd()">解锁查看</button>
    </div>

    <!-- 加密私密内容 -->
    <div id="content">
        <h1>我有你给的爱因而完全——《天下无双》</h1>
        <h2 style="font-size:20px;font-weight:normal;">2026/7/4 制作这个网页的初衷是，希望即使数十年后我们离开这个世界，我们经历的点点滴滴也能永远留在这里。</h2>
        <p>情书开个头吧，我们用纸笔表达我们的心意~</p>
        
        <img class="autoimg" src="qs1.png" alt="最爱的老婆写给我的情书哟~每次看都会很感动！">
        <img class="autoimg" src="qs2.png" alt="最爱的老婆写给我的情书哟~每次看都会很感动！">
        <img class="autoimg" src="qs3.png" alt="最爱的老婆写给我的情书哟~每次看都会很感动！">
    </div>







    
<script>
// 仅填写纯数字/文字密码
const PASSWORD = "20060318";
function checkPwd(){
    let input = document.getElementById("pwd").value.trim();
    if(input === PASSWORD){
        document.getElementById("lockBox").style.display = "none";
        document.getElementById("content").style.display = "block";
    }else{
        alert("密码不对，去问一下李好密码是多少~");
    }
}
</script>
</body>
</html>
