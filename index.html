<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Just the two us</title>
    <style>
        body { 
            text-align: center; 
            margin-top: 100px;
            font-family: "Microsoft Yahei", sans-serif;
        }
        /* 全局图片缩放控制区，只改scale-rate统一缩放 */
        :root {
          --scale-rate: 0.8;
          --base-max-w: 200px;
          --base-max-h: 200px;
          --real-max-w: calc(var(--base-max-w) * var(--scale-rate));
          --real-max-h: calc(var(--base-max-h) * var(--scale-rate));
        }
        #lockBox {
            margin: 120px auto;
        }
        #pwd {
            padding: 16px 24px;
            font-size: 32px;
            width: 220px;
        }
        button {
            padding: 16px 40px;
            font-size: 32px;
            cursor: pointer;
            margin-top: 16px;
        }
        #content {
            display: none;
            line-height: 2.2;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .autosingleimg {
            max-width: 90%;
            width: 700px;
            height: auto;
            display: block;
            margin: 30px auto;
            border-radius: 10px;
        }
        .img-row {
            display: flex;
            gap: 5px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .img-row .llimg {
            width: auto;
            height: auto;
            max-width: var(--real-max-w);
            max-height: var(--real-max-h);
            margin: 0;
            border-radius: 8px;
            object-fit: contain;
        }
        .box-wrap {
            border: 10px solid #ff88aa;
            border-radius: 12px;
            padding: 25px;
            max-width: 800px;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <!-- 密码输入框 -->
    <div id="lockBox">
        <h1>请输入访问密码</h1>
        <input type="password" id="pwd" placeholder="输入密码">
        <br>
        <br>
        <button onclick="checkPwd()">解锁查看</button>
    </div>

    <!-- 加密私密内容全部放入方框 -->
    <div id="content">
        <div class="box-wrap">
            <h1>我有你给的爱因而完全——《天下无双》</h1>
            <h2 style="font-size:20px;font-weight:normal;">2026/7/4 </h2>
            <h2 style="font-size:20px;font-weight:normal;">制作这个网页的初衷是，希望即使数十年后我们离开这个世界，我们经历的点点滴滴也能永远留在这里。</h2>
            <h2 style="font-size:20px;font-weight:normal;">vensail</h2>
            <br>
            
            <p>❤️❤️❤️❤️❤️❤️❤️❤️❤️</p>
            <h2>2026/7/5 我们互相详细地了解彼此的恋爱观</h2>
            <div class="img-row">
                <img class="llimg" src="images/lhlag1.jpg">
                <img class="llimg" src="images/lhlag2.jpg">
                <img class="llimg" src="images/lhlag3.jpg">
            </div>
            <div class="img-row">
                <img class="llimg" src="images/wyhlag1.jpg">
                <img class="llimg" src="images/wyhlag2.jpg">
                <img class="llimg" src="images/wyhlag3.jpg">
            </div>
            <h2>很契合呀！李好和万宇航真是天造地设的一对~</h2>
            <p>❤️❤️❤️❤️❤️❤️❤️❤️❤️</p>
            <h2>2026/6/27 我们用纸笔传达彼此的心意~</h2>
            <div class="img-row">
                <img class="llimg" src="images/qs1.jpg">
                <img class="llimg" src="images/qs2.jpg">
                <img class="llimg" src="images/qs3.jpg">
            </div>
            <h2>每次看都很感动，很温暖！我要一直爱李好~</h2>
            <p>❤️❤️❤️❤️❤️❤️❤️❤️❤️</p>
        </div>
    </div>

<script>
const PASSWORD = "20060318";
function checkPwd(){
    let input = document.getElementById("pwd").value.trim();
    if(input === PASSWORD){
        document.getElementById("lockBox").style.display = "none";
        document.getElementById("content").style.display = "block";
    }else{
        alert("密码不对，去问一下李好密码是多少~");
    }
}
</script>
</body>
</html>
